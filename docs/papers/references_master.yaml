# Master reference list extracted from the 3 core AgentEcon Readiness papers
# Source papers:
#   T = TERMS-Bench (Zhang et al. 2026, arxiv 2605.13909)
#   E = EconEvals (Fish et al. 2026, arxiv 2503.18825)
#   R = Revealed Rationality (Andrews 2026, MIT/NBER)
# Each entry tracks which source(s) cite it.
#
# Filter rules applied:
#   - Skip model-release blog posts (Anthropic Claude release notes, OpenAI ChatGPT pages, etc.)
#   - Skip company product pages (Doubao, Qwen, ZAI, Gemma model cards)
#   - Skip news articles (Bloomberg, HBR, etc.)
#   - Keep all peer-reviewed + arxiv + working papers
#   - Keep classic foundational papers (Nash, Savage, Knight, Afriat) for completeness
#     (these may not have downloadable PDFs but are essential context)

